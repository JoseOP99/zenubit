    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Qué es Zenubit?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Zenubit es una empresa de desarrollo web y automatización inteligente basada en Tuchin, Córdoba, Colombia. Creamos páginas web y soluciones de transformación digital a la medida de cada negocio, con especialidad en Power Platform, AppSheet, RPA y desarrollo web con IA."
            }
          },
          {
            "@type": "Question",
            "name": "¿Zenubit hace páginas web?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. Diseñamos y desarrollamos páginas web y plataformas digitales a la medida de cada negocio, con una inversión ajustada al alcance y presupuesto del proyecto."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuáles son los servicios principales de Zenubit?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Zenubit ofrece cinco áreas de servicio: (1) Páginas Web y Transformación Digital; (2) Power Platform - automatización con Power Automate, Power Apps, Power BI y Dataverse; (3) AppSheet - desarrollo de apps móviles y web no-code; (4) Vibe Coding & AI - desarrollo web personalizado con modelos de IA; (5) RPA & Procesos - automatización robótica con UiPath y flujos inteligentes."
            }
          },
          {
            "@type": "Question",
            "name": "¿Zenubit ofrece cotizaciones ajustadas al presupuesto de cada proyecto?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. Adaptamos cada propuesta al alcance y presupuesto del proyecto tras un diagnóstico inicial. Puedes solicitar una cotización gratuita sin compromiso."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué diferencia hay entre Power Platform y AppSheet?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Power Platform es la suite empresarial de Microsoft para automatización, análisis y gestión de datos. AppSheet es una plataforma no-code de Google especializada en desarrollo ágil de aplicaciones móviles y web. En Zenubit usamos ambas según tus necesidades específicas."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cómo es el proceso de implementación en Zenubit?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Nuestro proceso de 4 fases es: (1) Diagnóstico - mapeo del proceso e identificación de cuellos de botella; (2) Diseño - arquitectura y validación antes de codificar; (3) Construcción - implementación ágil con entregas semanales; (4) Operación - despliegue, capacitación y soporte continuo."
            }
          },
          {
            "@type": "Question",
            "name": "¿Zenubit atiende empresas fuera de Tuchin?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí, aunque estamos basados en Tuchin, Córdoba, servimos empresas en toda Colombia, incluyendo Bogotá, Medellín, Cali y otras ciudades. También trabajamos con clientes remotos a nivel nacional e internacional."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuánto tiempo tarda implementar una solución?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "El tiempo varía según la complejidad. En promedio, nuestros clientes logran go-live (puesta en producción) en 3-4 semanas desde el diagnóstico hasta operación. Ofrecemos entregas iterativas semanales para garantizar visibilidad continua."
            }
          }
